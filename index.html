<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<style>
  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --accent: #e94560;
    --gold: #f0a500;
    --text: #e0e0e0;
    --muted: #888;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    }

  /* ── Hero ── */
  .hero {
    text-align: center;
    padding: calc(16px + var(--safe-top)) 16px 20px;
  }
  .hero h1 {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
    line-height: 1.15;
  }
  .hero .tagline {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
    max-width: 320px;

  .hero .tagline em { color: var(--accent); font-style: normal; }
  .hero .count {
    color: #4ecca3;
    font-size: 12px;
    margin-top: 10px;
    font-weight: 500;
  }

  /* ── Search ── */
  .search-wrap {
    padding: 0 16px;
    margin-bottom: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding-top: 6px;
  }
  .search-box {
    display: flex;
    gap: 0;
    background: var(--card);
    border: 1px solid #333;
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    color: #fff;
    font-size: 15px;
    padding: 13px 14px;
    outline: none;
    font-family: inherit;
    min-width: 0;

  .search-box button {
    flex-shrink: 0;
    min-width: 52px;
    padding: 0 14px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-weight: 700;
    font-size: 18px;
    cursor: pointer;
    transition: 0.15s;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;

  .search-box button:active { background: #c23152; }

    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 0 16px 20px;
  }
  .chip {
    padding: 8px 14px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 18px;
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    transition: 0.15s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    max-width: calc(100% - 4px);
    overflow: hidden;
    text-overflow: ellipsis;

    padding: 0 16px calc(24px + var(--safe-bottom));
  }
  .movie-card {
    background: var(--card);
    border: 1px solid #2a2a2a;
    border-radius: 16px;

    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .movie-header {
    display: flex;
    gap: 14px;
    padding: 16px;
    align-items: flex-start;
  }
  .movie-poster {
    width: 80px;
    height: 118px;
    background: #0f0f0f;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    border: 1px solid #2a2a2a;
    line-height: 1;
  }
  .movie-info { flex: 1; min-width: 0; }
  .movie-info h2 {
    font-size: 19px;
    font-weight: 800;
    margin-bottom: 2px;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .movie-info .year {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 8px;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 5px;
  }
  .tag {
    padding: 4px 10px;
    background: #2a1a20;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.4;
  }
  .tag.gold {
    background: #2a2010;
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ── Why ── */
  .why {
    background: #0f0f0f;
    padding: 14px 16px;
    border-top: 1px solid #222;
    font-size: 14px;
    line-height: 1.6;
    color: #bbb;
  }
  .why strong { color: var(--gold); font-weight: 700; }

  /* ── Footer TG ── */
  .footer-tg {
    background: #0d0d0d;
    padding: 12px 16px;
    border-top: 1px solid #222;
    font-size: 12px;
    color: #555;
    text-align: center;
  }
  .footer-tg a { color: var(--accent); text-decoration: none; font-weight: 600; }

  /* ── Alternatives ── */
  .alt-wrap { padding: 10px 16px 14px; }
  .alt-label { color: #666; font-size: 11px; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
  .alt-list { display: flex; gap: 7px; flex-wrap: wrap; }
  .alt-chip {
    padding: 7px 13px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    transition: 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .alt-chip:active { border-color: var(--accent); color: #fff; }

  /* ── States ── */
  .thinking {
    text-align: center;
    padding: 50px 16px;

    font-size: 16px;
  }
  .thinking .dots::after {
    content: '';

<script>
// ===== MATCH ENGINE =====
function matchScore(movie, query) {
  const q = query.toLowerCase();
  let score = 0;
  const allText = [...movie.vibes, ...movie.tags, ...(movie.location || []), movie.title.toLowerCase(), (movie.title_ru || '').toLowerCase(), movie.why || '', (movie.director || '')].join(' ');

  const stopWords = new Set(['хочу', 'дай', 'покажи', 'нужен', 'нужна', 'нужно', 'надо', 'ищу', 'подбери', 'посоветуй', 'что', 'какой', 'какая', 'какое', 'мне', 'я', 'бы', 'чтоб', 'чтобы', 'просто', 'очень', 'вообще', 'в', 'на', 'с', 'и', 'а', 'но']);
  const qWords = q.split(/[\s,]+/).filter(w => w.length > 1 && !stopWords.has(w.toLowerCase()));
  let matchedWords = 0;

  for (const w of qWords) {
    let matched = false;
    if (allText.includes(w)) { score += 3; matched = true; }
    if (w.length > 3) {
      for (const vibe of movie.vibes) {
        if (vibe.includes(w) || w.includes(vibe.slice(0, Math.min(vibe.length, w.length)))) {
          score += 1; matched = true;
        }
      }
    }
    if (matched) matchedWords++;
  }

  const coverage = qWords.length > 0 ? matchedWords / qWords.length : 1;
  score = Math.round(score * coverage);

  if (movie.location) {
    for (const w of qWords) {
      if (movie.location.some(loc => loc.toLowerCase().includes(w) || w.includes(loc.toLowerCase()))) {
        score += 10; break;
      }
    }
  }

  const phrases = [
    ['устал', 'беготн', 'сует', 'тишин', 'спокойств', 'медлен'],
    ['ночн', 'дожд', 'одиноч', 'неон', 'город'],
    ['влюб', 'жизн', 'тепл', 'уют', 'радост', 'добр'],
    ['тревож', 'трево', 'стресс', 'бездн'],
    ['красот', 'эстетик', 'стил', 'визуал'],
    ['азиат', 'япон', 'корей', 'токи'],
    ['трип', 'психодел', 'сюрреал', 'стран'],
    ['эпическ', 'масштаб', 'большо'],
    ['меланхол', 'груст', 'печал', 'хандра'],
    ['смешн', 'комеди', 'ржа', 'юмор'],
    ['энерг', 'драйв', 'мотивац', 'пинок'],
    ['смысл', 'выгоран', 'кризис', 'зачем'],
    ['романтик', 'любов', 'свидан', 'поцелуй', 'нежност'],
    ['динамич', 'экшн', 'боев', 'взрыв', 'погон', 'перестрел'],
  ];
  for (const group of phrases) {
    if (group.some(p => q.includes(p))) {
      let groupMatched = false;
      for (const vibe of movie.vibes) {
        if (group.some(p => vibe.includes(p))) { score += 5; groupMatched = true; }
      }
      for (const tag of movie.tags) {
        if (group.some(p => tag.toLowerCase().includes(p))) { score += 3; groupMatched = true; }
      }
      // Penalize if query has this vibe but film doesn't match it
      if (!groupMatched) score -= 15;
    }
  }

  // Director bonus (only if word NOT in ANY film title)
  if (movie.director) {
    const dirLow = movie.director.toLowerCase();
    const dirParts = dirLow.split(', ').join(' ').split(' ');
    for (const w of qWords) {
      if (w.length < 3) continue;
      // Check if this word appears in ANY film title
      const inAnyTitle = movieDB.some(f => {
        const t = (f.title + ' ' + (f.title_ru || '')).toLowerCase();
        return t.includes(w);
      });
      if (inAnyTitle) continue;
      if (dirParts.some(dp => dp.length >= 4 && (w.startsWith(dp) || dp.startsWith(w)))) {
        score += 15; matchedWords++;
      }
    }
    if (dirParts.some(dp => dp.length >= 4 && q.replace(/\s+/g, '').includes(dp))) score += 10;
  }

  return score;
}

// ===== SEARCH =====
function findMovie() {
  const input = document.getElementById('searchInput');
  const query = input.value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '⏳';
  input.blur();

  const wrap = document.getElementById('resultWrap');
  wrap.innerHTML = '<div class="thinking">Ищу твой вайб<span class="dots"></span></div>';

  setTimeout(() => {
    const lower = query.toLowerCase();
    const isBest = /\u043B\u0443\u0447\u0448|\u043A\u043B\u0430\u0441\u0441\u043D|\u043E\u0444\u0438\u0433\u0435\u043D|\u0438\u043C\u0431\u0430|\u043F\u0443\u0448\u043A\u0430|\u043E\u0433\u043E\u043D\u044C|\u0441\u0430\u043C\u044B\u0439|best|top|\u0442\u043E\u043F|\u043A\u0440\u0443\u0442|\u043E\u0442\u043B\u0438\u0447\u043D/.test(lower);
    const isWorst = /\u0445\u0443\u0434\u0448|\u043E\u0442\u0441\u0442\u043E\u0439|\u0443\u0436\u0430\u0441\u043D|\u043F\u043B\u043E\u0445|worst|\u0434\u043D\u043E/.test(lower);

    let scored;

    // Best/worst search (with or without director)
    if (isBest || isWorst) {
      // Try director filter first
      var dirFilms = movieDB.filter(function(f) {
        return f.director && f.rating && f.director.toLowerCase().split(', ').some(function(d) {
          return d.toLowerCase().split(' ').some(function(part) {
            if (part.length < 4) return false;
            if (lower.includes(part)) return true;
            return lower.split(/[\s,]+/).some(function(qw) {
              return qw.length >= part.length - 1 && qw.startsWith(part);
            });
          });
        });
      });

      var pool = dirFilms.length >= 2 ? dirFilms : movieDB.filter(function(f) { return f.rating; });
      if (dirFilms.length >= 2) {
        // Director match: score + sort by rating
        pool.sort(function(a, b) { return isWorst ? a.rating - b.rating : b.rating - a.rating; });
        scored = pool.map(function(m) { return { movie: m, score: matchScore(m, query) }; });
        scored.sort(function(a, b) { return b.score - a.score; });
        var topBest = scored.filter(function(s) { return s.score > 0; }).slice(0, 3);
        topBest.sort(function(a, b) { return isWorst ? a.movie.rating - b.movie.rating : b.movie.rating - a.movie.rating; });
        scored = topBest.length > 0 ? topBest : scored.slice(0, 1);
      } else {
        // No director: pure rating sort, no matchScore filter
        pool.sort(function(a, b) { return isWorst ? a.rating - b.rating : b.rating - a.rating; });
        scored = pool.slice(0, 3).map(function(m) { return { movie: m, score: 1 }; });
      }
    } else {
      scored = movieDB.map(m => ({ movie: m, score: matchScore(m, query) }));
      scored.sort((a, b) => b.score - a.score);
    }

    const top = scored[0];
    const alternatives = scored.slice(1, 4).filter(s => s.score > 0).map(s => s.movie);

    if (top.score === 0) {
      wrap.innerHTML = `
        <div class="empty-state">
          <span class="big-emoji">🤔</span>
          <p>Сложный вайб. Попробуй описать иначе:<br>больше <em>настроения</em>, меньше конкретики.</p>
        </div>`;
    } else {
      const m = top.movie;
      const isLegend = m.rating && m.rating >= 10;
      const locHTML = (m.location && m.location.length) ? `
        <div class="tags" style="margin-top:3px">${m.location.map(l => `<span class="tag gold">📍 ${l}</span>`).join('')}</div>` : '';

      const altHTML = alternatives.length > 0 ? `
        <div class="alt-wrap">
          <div class="alt-label">Ещё в этот вайб</div>
          <div class="alt-list">
            ${alternatives.map(a => `
              <span class="alt-chip" onclick="quickPick('${a.title.replace(/'/g, "\\'")}')">
                ${a.title_ru && a.title_ru !== 'N/A' ? a.title_ru : a.title} (${a.year})
              </span>
            `).join('')}
          </div>
        </div>` : '';

      wrap.innerHTML = `
        <div class="movie-card">
          <div class="movie-header">
            <div class="movie-poster">${m.poster && m.poster.startsWith('http') ? '<img src="' + m.poster + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:10px" loading="lazy">' : m.poster}</div>
            <div class="movie-info">
              <h2>${m.title_ru && m.title_ru !== 'N/A' ? m.title_ru : m.title}${m.title_ru && m.title_ru !== 'N/A' && m.title_ru !== m.title ? ' <small style="color:#888;font-size:14px">(' + m.title + ')</small>' : ''}</h2>
              <div class="year">${m.year}${isLegend ? ' <span style="color:#f0a500;font-weight:700">⭐ 11/10</span>' : (m.rating ? ' <span style="color:#f0a500">⭐ ' + m.rating + '</span>' : '')}</div>
              ${m.director ? '<div style="color:#aaa;font-size:13px;margin-top:2px">🎬 ' + m.director + '</div>' : ''}
              ${m.tags && m.tags.length ? `
              <div class="tags">${m.tags.map(t => `<span class="tag${isLegend ? ' gold' : ''}">${t}</span>`).join('')}</div>` : ''}
              ${locHTML}
            </div>
          </div>
          ${m.why ? `<div class="why"><strong>${isLegend ? '🔥 Почему это легенда' : 'Почему он'}:</strong> ${m.why}</div>` : ''}
          <div class="footer-tg">
            ${isLegend ? '<span style="color:#f0a500">👑 Любимый фильм Хахузы. Лучше ещё не сняли.</span>' : '<a href="https://t.me/pokanevkino" target="_blank">@pokanevkino</a> · 1317 фильмов, просмотренных лично'}
          </div>
          ${altHTML}
        </div>`;
      wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    btn.disabled = false;
    btn.textContent = '🎯';
  }, 400 + Math.random() * 400);
}

document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') findMovie();

function shuffleChips() {
  const pool = [...vibeChipPool];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const chips = pool.slice(0, 6);
  const container = document.getElementById('vibeChips');
  container.innerHTML = chips.map(v =>
    `<span class="chip" onclick="chipClick(this)">${v}</span>`
  ).join('');
}
shuffleChips();

function chipClick(el) {
  document.getElementById('searchInput').value = el.textContent;
  findMovie();
}

function quickPick(title) {
  document.getElementById('searchInput').value = title;
  findMovie();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
