<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Вайб-кинотека Хахузы — 1317 фильмов, каждый просмотрен лично. Подбор по настроению.">
<title>🎬 Вайб-кинотека Хахузы</title>
<style>
  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --accent: #e94560;
    --gold: #f0a500;
    --text: #e0e0e0;
    --muted: #888;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  /* Hero — компактно */
  .hero {
    text-align: center;
    padding: calc(20px + var(--safe-top)) 16px 16px;
  }
  .hero .logo { font-size: 36px; margin-bottom: 4px; display: block; }
  .hero h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .hero .tagline {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
    padding: 0 4px;
  }
  .hero .tagline em { color: var(--accent); font-style: normal; }
  .hero .count { color: #4ecca3; font-size: 12px; margin-top: 6px; }

  /* Search — полная ширина */
  .search-wrap {
    padding: 0 12px 8px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding-top: 8px;
  }
  .search-box {
    display: flex;
    gap: 8px;
    background: var(--card);
    border: 1px solid #333;
    border-radius: 14px;
    padding: 4px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    font-size: 15px;
    padding: 12px 10px;
    outline: none;
    font-family: inherit;
    min-width: 0;
  }
  .search-box input::placeholder { color: #555; font-size: 14px; }
  .search-box button {
    padding: 12px 16px;
    background: var(--accent);
    border: none;
    color: white;
    font-weight: 700;
    font-size: 14px;
    border-radius: 11px;
    cursor: pointer;
    transition: 0.15s;
    font-family: inherit;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .search-box button:active { background: #c23152; transform: scale(0.96); }
  .search-box button:disabled { opacity: 0.4; }

  /* Chips */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 12px 12px;
    justify-content: flex-start;
  }
  .chip {
    padding: 7px 13px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    transition: 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    max-width: calc(50vw - 16px);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chip:active { border-color: var(--gold); color: var(--gold); background: #1a1510; }

  /* Result */
  .result-wrap {
    padding: 0 12px;
    padding-bottom: calc(20px + var(--safe-bottom));
  }
  .movie-card {
    background: var(--card);
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    overflow: hidden;
    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Постер + заголовок */
  .movie-header {
    display: flex;
    gap: 14px;
    padding: 16px;
    align-items: flex-start;
  }
  .movie-poster {
    width: 80px;
    height: 118px;
    background: #0f0f0f;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    border: 1px solid #2a2a2a;
  }
  .movie-info { flex: 1; min-width: 0; }
  .movie-info h2 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 1px;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .movie-info .year {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 6px;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 6px;
  }
  .tag {
    padding: 3px 9px;
    background: #2a1a20;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.3;
  }
  .tag.gold {
    background: #2a2010;
    border-color: var(--gold);
    color: var(--gold);
  }
  .loc-tags { margin-top: 2px; }
  .loc-tags .tag { font-size: 10px; }

  /* Why */
  .why {
    background: #0f0f0f;
    padding: 14px 16px;
    border-top: 1px solid #222;
    font-size: 13px;
    line-height: 1.65;
    color: #bbb;
  }
  .why strong { color: var(--gold); }

  /* Footer ссылка на ТГ */
  .footer-tg {
    background: #111;
    padding: 12px 16px;
    border-top: 1px solid #222;
    font-size: 12px;
    color: #666;
    text-align: center;
  }
  .footer-tg a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }

  /* Alternatives */
  .alt-wrap { padding: 8px 16px 14px; }
  .alt-label { color: #888; font-size: 11px; margin-bottom: 6px; }
  .alt-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .alt-chip {
    padding: 6px 12px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    transition: 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .alt-chip:active { border-color: var(--accent); color: white; }

  /* States */
  .thinking {
    text-align: center;
    padding: 40px 16px;
    color: var(--muted);
    font-size: 15px;
  }
  .thinking .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
  }
  .empty-state {
    text-align: center;
    padding: 40px 16px;
    color: var(--muted);
  }
  .empty-state .big-emoji { font-size: 48px; margin-bottom: 10px; display: block; }
  .empty-state p { font-size: 14px; line-height: 1.5; }
  .empty-state em { color: var(--accent); font-style: normal; }

  /* Toast */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a1a20;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="hero">
  <span class="logo">🎬</span>
  <h1>Вайб-кинотека Хахузы</h1>
  <p class="tagline">
    Опиши <em>настроение</em> или <em>вайб</em> — получи фильм, который попадёт в точку.
  </p>
  <p class="count">1317 фильмов — каждый просмотрен лично</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input
      type="text" id="searchInput"
      placeholder="Париж, дождь, меланхолия..."
      autocomplete="off"
    />
    <button id="searchBtn" onclick="findMovie()">🎯</button>
  </div>
</div>

<div class="examples" id="vibeChips"></div>

<div class="result-wrap" id="resultWrap">
  <div class="empty-state">
    <span class="big-emoji">🎥</span>
    <p>Напиши что чувствуешь — подберу кино.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// movieDB loaded from films-data.js
</script>
<script src="films-data.js"></script>
<script>
// ===== MATCH ENGINE =====
function matchScore(movie, query) {
  const q = query.toLowerCase();
  let score = 0;
  const allText = [...movie.vibes, ...movie.tags, ...(movie.location || []), movie.title.toLowerCase(), movie.why || ''].join(' ');

  const stopWords = new Set(['хочу', 'дай', 'покажи', 'нужен', 'нужна', 'нужно', 'надо', 'ищу', 'подбери', 'посоветуй', 'что', 'какой', 'какая', 'какое', 'мне', 'я', 'бы', 'чтоб', 'чтобы', 'просто', 'очень', 'вообще', 'в', 'на', 'с', 'и', 'а', 'но']);
  const qWords = q.split(/[\s,]+/).filter(w => w.length > 1 && !stopWords.has(w.toLowerCase()));
  let matchedWords = 0;

  for (const w of qWords) {
    let matched = false;
    if (allText.includes(w)) { score += 3; matched = true; }
    if (w.length > 3) {
      for (const vibe of movie.vibes) {
        if (vibe.includes(w) || w.includes(vibe.slice(0, Math.min(vibe.length, w.length)))) {
          score += 1; matched = true;
        }
      }
    }
    if (matched) matchedWords++;
  }

  const coverage = qWords.length > 0 ? matchedWords / qWords.length : 1;
  score = Math.round(score * coverage);

  if (movie.location) {
    for (const w of qWords) {
      if (movie.location.some(loc => loc.toLowerCase().includes(w) || w.includes(loc.toLowerCase()))) {
        score += 10; break;
      }
    }
  }

  const phrases = [
    ['устал', 'беготн', 'сует', 'тишин', 'спокойств', 'медлен'],
    ['ночн', 'дожд', 'одиноч', 'неон', 'город'],
    ['влюб', 'жизн', 'тепл', 'уют', 'радост', 'добр'],
    ['тревож', 'трево', 'стресс', 'бездн'],
    ['красот', 'эстетик', 'стил', 'визуал'],
    ['азиат', 'япон', 'корей', 'токи'],
    ['трип', 'психодел', 'сюрреал', 'стран'],
    ['эпическ', 'масштаб', 'большо'],
    ['меланхол', 'груст', 'печал', 'хандра'],
    ['смешн', 'комеди', 'ржа', 'юмор'],
    ['энерг', 'драйв', 'мотивац', 'пинок'],
    ['смысл', 'выгоран', 'кризис', 'зачем'],
  ];
  for (const group of phrases) {
    if (group.some(p => q.includes(p))) {
      for (const vibe of movie.vibes) {
        if (group.some(p => vibe.includes(p))) score += 5;
      }
      for (const tag of movie.tags) {
        if (group.some(p => tag.toLowerCase().includes(p))) score += 3;
      }
    }
  }

  return score;
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== SEARCH =====
function findMovie() {
  const input = document.getElementById('searchInput');
  const query = input.value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '⏳';
  input.blur(); // hide keyboard

  const wrap = document.getElementById('resultWrap');
  wrap.innerHTML = '<div class="thinking">Ищу твой вайб<span class="dots"></span></div>';

  setTimeout(() => {
    const scored = movieDB.map(m => ({ movie: m, score: matchScore(m, query) }));
    scored.sort((a, b) => b.score - a.score);

    const top = scored[0];
    const alternatives = scored.slice(1, 4).filter(s => s.score > 0).map(s => s.movie);

    if (top.score === 0) {
      wrap.innerHTML = `
        <div class="empty-state">
          <span class="big-emoji">🤔</span>
          <p>Сложный вайб! Попробуй описать иначе:<br>больше <em>настроения</em>, меньше конкретики.</p>
        </div>`;
    } else {
      const m = top.movie;
      const locHTML = (m.location && m.location.length) ? `
        <div class="tags loc-tags">${m.location.map(l => `<span class="tag gold">📍 ${l}</span>`).join('')}</div>` : '';

      const altHTML = alternatives.length > 0 ? `
        <div class="alt-wrap">
          <div class="alt-label">Ещё в этот вайб:</div>
          <div class="alt-list">
            ${alternatives.map(a => `
              <span class="alt-chip" onclick="quickPick('${a.title.replace(/'/g, "\\'")}')">
                ${a.poster} ${a.title} (${a.year})
              </span>
            `).join('')}
          </div>
        </div>` : '';

      wrap.innerHTML = `
        <div class="movie-card">
          <div class="movie-header">
            <div class="movie-poster">${m.poster}</div>
            <div class="movie-info">
              <h2>${m.title}</h2>
              <div class="year">${m.year}</div>
              ${m.tags && m.tags.length ? `
              <div class="tags">${m.tags.map(t => `<span class="tag${Math.random() > 0.6 ? ' gold' : ''}">${t}</span>`).join('')}</div>` : ''}
              ${locHTML}
            </div>
          </div>
          ${m.why ? `
          <div class="why">
            <strong>Почему он:</strong> ${m.why}
          </div>` : ''}
          <div class="footer-tg">
            🎬 Из личной коллекции <a href="https://t.me/pokanevkino" target="_blank">@pokanevkino</a>
          </div>
          ${altHTML}
        </div>`;
      wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    btn.disabled = false;
    btn.textContent = '🎯';
  }, 400 + Math.random() * 400);
}

document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') findMovie();
});

// ===== VIBE CHIPS =====
const vibeChipPool = [
  'устал от беготни, хочу тишины',
  'ночной город, дождь, одиночество',
  'хочу влюбиться в жизнь заново',
  'тревожно, нужен уют и тепло',
  'всё достало, дайте красоты',
  'хочу азиатской меланхолии',
  'эстетика 80-х, синты, неон',
  'покажите мне трип без наркотиков',
  'нужен пинок и мотивация',
  'хочу чтобы мозг взорвался',
  'одиноко, хочу красивого',
  'дай мне что-то тёплое и уютное',
  'хочу эпического размаха',
  'покажи мне безумие',
  'нужен фильм под пиво и чипсы',
  'дай что-то стильное и красивое',
  'хочу поплакать, но красиво',
  'нужна сказка для взрослых',
  'покажи мне что-то странное',
  'хочу ретро-вайб и неон',
  'нужен уютный детектив',
  'космос, тишина, одиночество',
  'Париж, дождь, меланхолия',
  'хочу корейского стиля',
  'нужен фильм-праздник',
  'всё заебало, хочу в горы',
  'дай мне Лос-Анджелес и закаты',
  'хочу японской эстетики',
  'покажи мне идеальную пару',
  'нужен нуар и сигаретный дым',
];

function shuffleChips() {
  const pool = [...vibeChipPool];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const chips = pool.slice(0, 8);
  const container = document.getElementById('vibeChips');
  container.innerHTML = chips.map(v =>
    `<span class="chip" onclick="chipClick(this)">${v}</span>`
  ).join('');
}
shuffleChips();

function chipClick(el) {
  document.getElementById('searchInput').value = el.textContent;
  findMovie();
}

function quickPick(title) {
  document.getElementById('searchInput').value = title;
  findMovie();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Telegram WebApp — expand to full height
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
